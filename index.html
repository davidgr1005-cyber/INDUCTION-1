<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de Evaluación - Seguridad</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .login-box { margin-top: 100px; background: white; padding: 20px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #form-container { display: none; margin-top: 20px; }
        input { padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login" class="login-box">
        <h2>Acceso Autorizado</h2>
        <p>Ingrese la clave de seguridad para acceder al formulario:</p>
        <input type="password" id="pass" placeholder="Código">
        <button onclick="validar()">Entrar</button>
    </div>

    <div id="form-container">
        <iframe width="640px" height="480px" src="https://forms.office.com/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAZAAMNFAJJUNUhUOUpYOVRDMEYwV0JONENDT0RLQUVVUS4u" frameborder="0" marginwidth="0" marginheight="0" style="border: none; max-width:100%; max-height:100vh" allowfullscreen webkitallowfullscreen mozallowfullscreen msallowfullscreen> </iframe>
    </div>

    <script>
        function validar() {
            const clave = document.getElementById('pass').value;
            if (clave === "1455") { // Tu clave
                document.getElementById('login').style.display = 'none';
                document.getElementById('form-container').style.display = 'block';
            } else {
                alert("Clave incorrecta. Acceso denegado.");
            }
        }
    </script>
</body>
</html>
