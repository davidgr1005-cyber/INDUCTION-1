<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Evaluación - AICM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .header-logos { background: white; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; align-items: center; border-bottom: 3px solid #0078d4; margin-bottom: 20px; border-radius: 12px; }
        .header-logos img { height: auto; max-height: 50px; max-width: 40%; object-fit: contain; }
        @media (max-width: 600px) { .header-logos img { max-height: 40px; max-width: 80%; } }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .btn { background: #0078d4; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #005a9e; }
        input[type="text"], input[type="password"] { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .pregunta { text-align: left; margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        video { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header-logos container">
    <img src="https://storageaicm.blob.core.windows.net/capacitacion/LOGO.png?sp=r&st=2026-03-20T05:56:31Z&se=2029-03-20T14:11:31Z&spr=https&sv=2024-11-04&sr=b&sig=0giimBnJuZyMtK8TLfkrxOpazsj7CkSXTAeQ5rMpZn8%3D" alt="Logo AICM">
</div>

<div class="container">
    <div id="sec-login">
        <h2>Control de Acceso</h2>
        <input type="text" id="nombre-usuario" placeholder="Nombre completo (Apellidos primero)" oninput="this.value = this.value.toUpperCase()"><br>
        <input type="text" id="dependencia" placeholder="Dependencia / Empresa" oninput="this.value = this.value.toUpperCase()"><br>        
        <input type="password" id="clave" placeholder="Clave de acceso"><br>
        <button id="btn-login" class="btn" onclick="validarAcceso()">Ingresar</button>
    </div>

   

    <div id="sec-video" class="hidden">
    <h2>Capacitación de Seguridad</h2>
    <p>Vea el video completo para habilitar el examen.</p>
    <div id="player"></div> 
    <br>
    <button id="btn-evaluacion" class="btn" onclick="mostrarExamen()" style="display:none;">Comenzar Evaluación</button>
</div>

    <div id="sec-examen" class="hidden">
        <h2 id="titulo-examen">Evaluación</h2>
        <div id="contenedor-preguntas"></div>
        <button class="btn" onclick="calificar()">Enviar Resultados</button>
    </div>

    <div id="sec-final" class="hidden">
        <h2 style="color: #28a745;">¡Evaluación Concluida con Éxito!</h2>
        <p id="mensaje-resultado" style="font-size: 18px; font-weight: bold;"></p>
        <p>Tu constancia se ha generado y descargado automáticamente.</p>
        <button class="btn" style="background: #28a745;" onclick="location.reload()">Finalizar y Salir</button>
    </div>
</div>

<script>
    var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '360',
        width: '100%',
        videoId: 'mZoVsEI33Bc', // Sustituye por el ID de tu video (ej: dQw4w9WgXcQ)
        playerVars: {
            'controls': 1,
            'rel': 0,
            'showinfo': 0,
            'modestbranding': 1
        },
        events: {
            'onStateChange': onPlayerStateChange
        }
    });
}

// 2. Detectar cuando el video termina
function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.ENDED) {
        document.getElementById('btn-evaluacion').style.display = 'block';
        Swal.fire({ 
            title: '¡Capacitación Finalizada!', 
            text: 'Ya puedes iniciar tu evaluación.', 
            icon: 'success', 
            confirmButtonColor: '#0078d4' 
        });
    }
}
    const video = document.getElementById('video-instruccion');
    const btnComenzar = document.getElementById('btn-evaluacion');
    let nombreCandidato = "";
    let dependenciaUsuario = "";
    let preguntasAleatorias = [];

    if (btnComenzar) btnComenzar.style.display = 'none';

    if (video && btnComenzar) {
        video.onended = function() {
            btnComenzar.style.display = 'block';
            Swal.fire({ title: '¡Capacitación Finalizada!', text: 'Ya puedes iniciar tu evaluación.', icon: 'success', confirmButtonColor: '#0078d4' });
        };
    }

    const bancoPreguntas = [
        { q: "En este documento se establecen Procedimientos de Prevención de Actos de Interferencia Ilícita y Procedimientos de Medidas de Seguridad Reforzadas", a: ["a) Plan de Seguridad del Aeropuerto", "b) Manual de Seguridad Industrial", "c) Reglamento de Operaciones del AICM", "d) Manual de Seguridad Operacional"], correct: 0 },
        { q: "Es un acto de interferencia ilícita:", a: ["a) Que una aeronave aterrizando por viento cruzado, se vaya al aire", "b) b) Comunicación de información falsa que compromete a la seguridad de una aeronave en vuelo, o en tierra, o la seguridad de los pasajeros, tripulación, personal de tierra y público en un aeropuerto o en el recinto de una instalación de aviación civil", "c) Fuga de gas en un local comercial del Fast Food", "d) Ninguna de las anteriores."], correct: 1 },
        { q: "El ingreso de personas por los controles de acceso del AICM, se permite verificando:", a: ["a) Credenciales empresa", "b) El uniforme", "c) Credenciales con código de barras", "d) Tarjetas de Identificación Aeroportuaria"], correct: 3 },
        { q: "La definición: “Es un Aeródromo civil de servicio público declarado internacional por el Ejecutivo Federal y habilitado, de conformidad con las disposiciones aplicables, con infraestructura, instalaciones y equipos adecuados para atender a las aeronaves, pasajeros, carga y correo del servicio de transporte aéreo internacional y que cuenta con autoridades competentes”, corresponde a:", a: ["a) Pista paralela", "b) Aeródromo Privado", "c) Aeropuerto Regional", "d) Aeropuerto Internacional"], correct: 3 },
        { q: "Los siguientes conceptos son zonas de seguridad en el AICM:", a: ["a) Zona sin Restricciones/Pública y Zona Estéril", "b) Zona de Protección Civil y Zona de Comidas", "c) Zona de Pistas y de Calles de Rodajes", "d) Zona de Combustibles y Zona de Estacionamientos"], correct: 0 },
        { q: "La definición de control de seguridad es la siguiente:", a: ["a) Tarjetas de Identificación Aeroportuaria", "b) Es un control que se establece en el pasillo ambulatorio de las terminales del aeropuerto y está separado de la vialidad por puertas de cristal", "c) Esa definición no se encuentra en la presentación", "d) Medios para evitar se introduzcan armas, explosivos u otros artefactos, objetos o sustancias peligrosas que puedan utilizarse para cometer Actos de Interferencia Ilícita"], correct: 3 },
        { q: "Son derechos y obligaciones del portador de una TIA:", a: ["a) Pedir prestada una en caso de olvido en casa u oficina.", "b) Guiar a los compañeros que no traigan TIA hacia la línea de inspección en PIP que tenga menos gente", "c) Usar los accesos permitidos por la TIA, No transferir/prestar la TIA, y Reportar l@s amenazas/vulnerabilidades/riesgos en el AICM a personal de seguridad", "d) Respuestas a), b) y c) son incorrectas"], correct: 2 },
        { q: "La zona sin restricciones/pública se define como:", a: ["a) El área situada frente a la terminal de pasajeros donde estos descienden del avión", "b) Zona de un aeropuerto a la que tiene acceso el público o a la cual el acceso no está restringido", "c) La parte de la pista en la que aterrizan las aeronaves", "d) La parte de la Plataforma en donde se estacionan las aeronaves"], correct: 1 },
        { q: "Los elementos en el control de un PIP son: Indicaciones de uso Obligatorio, Estrobo de lectora de TIA, Lectora de TIA e Indicaciones de artículos prohibidos y restringidos.", a: ["a) Verdadero", "b) Falso"], correct: 0 },
        { q: "La Alerta Uno en el Plan de Contingencia es cuando se presenta la posibilidad de que ocurra una contingencia, la cual puede ser superada sin daños o lesiones.", a: ["a) Verdadero", "b) Falso"], correct: 0 },
        { q: "El área restringida del aeropuerto, es la zona media entre el puesto de inspección de personas y la aeronave.", a: ["a) Verdadero", "b) Falso"], correct: 1 },
        { q: "Los tipos de TIA en el AICM son Permanente, Temporal y de Visitante.", a: ["a) Verdadero", "b) Falso"], correct: 0 },
        { q: "Cuando la TIA de un usuario sea rechazada en cualquier lectora de un Puesto de Inspección de Personal, debe pedir que se presente el supervisor y que llamen a un representante de la SEMAR.", a: ["a) Verdadero", "b) Falso"], correct: 1 },
        { q: "Dentro de los procedimientos de inspección que realiza el personal de seguridad, nunca debo dejar que hagan revisiones manuales a mi persona y pertenencias.", a: ["a) Verdadero", "b) Falso"], correct: 1 },
        { q: "El propósito y objetivo de la seguridad AVSEC es tratar de buscar estupefacientes, sustancias alucinógenas y dinero ilícito en los usuarios.", a: ["a) Verdadero", "b) Falso"], correct: 1 }
    ];

    function validarAcceso() {
        const pass = document.getElementById('clave').value;
        nombreCandidato = document.getElementById('nombre-usuario').value.trim().toUpperCase();
        dependenciaUsuario = document.getElementById('dependencia').value.trim().toUpperCase();

        if (localStorage.getItem("aprobado_" + nombreCandidato)) {
            Swal.fire({ title: 'Acceso Denegado', text: 'Ya has acreditado esta evaluación.', icon: 'warning' });
            return;
        }

        if (pass === "1455" && nombreCandidato.length > 5 && dependenciaUsuario.length > 2) {
            document.getElementById('sec-login').classList.add('hidden');
            document.getElementById('sec-video').classList.remove('hidden');
        } else {
            Swal.fire({ title: 'Error', text: 'Datos incorrectos o incompletos.', icon: 'error' });
        }
    }

    function mostrarExamen() {
        document.getElementById('sec-video').classList.add('hidden');
        document.getElementById('sec-examen').classList.remove('hidden');
        preguntasAleatorias = [...bancoPreguntas].sort(() => Math.random() - 0.5);
        renderizarPreguntas();
    }

    function renderizarPreguntas() {
        const contenedor = document.getElementById('contenedor-preguntas');
        contenedor.innerHTML = "";
        preguntasAleatorias.forEach((p, i) => {
            let html = `<div class="pregunta"><p><strong>${i+1}. ${p.q}</strong></p>`;
            p.a.forEach((opcion, index) => {
                html += `<label><input type="radio" name="p${i}" value="${index}"> ${opcion}</label><br>`;
            });
            html += `</div>`;
            contenedor.innerHTML += html;
        });
    }

    function calificar() {
        let aciertos = 0;
        let contestadas = 0;
        let respuestasOrdenadas = new Array(bancoPreguntas.length).fill("SIN RESPUESTA");

        // Validar si todas están contestadas
        preguntasAleatorias.forEach((p, i) => {
            const r = document.querySelector(`input[name="p${i}"]:checked`);
            if (r) {
                contestadas++;
                const indiceOriginal = bancoPreguntas.indexOf(p);
                const respuestaTexto = p.a[r.value];
                if (parseInt(r.value) === p.correct) aciertos++;
                respuestasOrdenadas[indiceOriginal] = respuestaTexto;
            }
        });

        // BLOQUEO SI FALTAN RESPUESTAS
        if (contestadas < bancoPreguntas.length) {
            Swal.fire({
                title: 'Evaluación Incompleta',
                text: `Has contestado ${contestadas} de ${bancoPreguntas.length} preguntas. Por favor, completa todas para enviar.`,
                icon: 'warning',
                confirmButtonColor: '#0078d4'
            });
            return; // Detiene la ejecución aquí
        }

        if (aciertos >= 12) {
            localStorage.setItem("aprobado_" + nombreCandidato, "true");
            document.getElementById('sec-examen').classList.add('hidden');
            document.getElementById('sec-final').classList.remove('hidden');
            document.getElementById('mensaje-resultado').innerText = `${nombreCandidato}, aprobaste con ${aciertos}/15.`;
            generarPDF(aciertos, respuestasOrdenadas);
        } else {
            Swal.fire({
                title: 'Puntaje Insuficiente',
                text: `Obtuviste ${aciertos}/15. Debes ver el video de nuevo.`,
                icon: 'error',
                confirmButtonText: 'Regresar al Video'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('sec-examen').classList.add('hidden');
                    document.getElementById('sec-video').classList.remove('hidden');
                    btnComenzar.style.display = 'none';
                    video.currentTime = 0;
                    const inputs = document.querySelectorAll('input[type="radio"]');
                    inputs.forEach(input => input.checked = false);
                }
            });
        }
    }

    async function generarPDF(puntos, respuestasParaEnviar) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const urlFondo = "https://storageaicm.blob.core.windows.net/capacitacion/CERTIFICADO.png?sp=r&st=2026-03-23T03:53:15Z&se=2028-03-23T12:08:15Z&spr=https&sv=2024-11-04&sr=b&sig=liwMPA%2B%2FrZ4WT4REiY3eVnOjIfPiRfJzesNNHBqYmuQ%3D";

        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = urlFondo;

        img.onload = function() {
            try {
                doc.addImage(img, 'PNG', 0, 0, 297, 210);
                doc.setFont("times", "italic");
                doc.setFontSize(30);
                doc.text(nombreCandidato, 148.5, 110, { align: "center" });
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(14);
                const califFinal = (puntos * 10 / 15).toFixed(1);
                doc.text(`Obteniendo la calificación de ${califFinal}`, 148.5, 155, { align: "center" });
                
                const fechaHoy = new Date().toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' });
                doc.text(`Fecha: ${fechaHoy}`, 148.5, 165, { align: "center" });
                doc.text("Con una duración de 02:00 horas", 148.5, 175, { align: "center" });
                
                doc.save(`Certificado_${nombreCandidato}.pdf`);

                const pdfBase64 = doc.output('datauristring').split(',')[1];
                enviarABaseDatos(puntos, respuestasParaEnviar, pdfBase64);
                
            } catch (err) {
                console.error("Error al procesar el PDF:", err);
                enviarABaseDatos(puntos, respuestasParaEnviar, "");
            }
        };

        img.onerror = function() {
            Swal.fire('Error de Conexión', 'No se pudo cargar el diseño del certificado.', 'error');
        };
    }

  function enviarABaseDatos(puntos, respuestasArray, pdfBase64) {
        const urlGAS = "TU_URL_DE_IMPLEMENTACION_AQUI"; 
        const promedioFinal = (puntos * 10 / 15).toFixed(1); // Cálculo del promedio

        const datos = { 
            nombre: nombreCandidato, 
            aciertos: puntos, 
            promedio: promedioFinal, // Enviamos el promedio
            empresa: dependenciaUsuario, 
            respuestas: respuestasArray,
            pdfBase64: pdfBase64 
        };

        fetch(urlGAS, { 
            method: "POST", 
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify(datos) 
        });

        // Bloqueos de seguridad (F12 y Clic derecho)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    }
    }
</script>
</body>
</html>
