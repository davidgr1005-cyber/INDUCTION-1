<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Evaluación - AICM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .btn { background: #0078d4; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #005a9e; }
        input[type="text"], input[type="password"] { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .pregunta { text-align: left; margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        video { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div id="sec-login">
        <h2>Control de Acceso</h2>
        <input type="text" id="nombre-usuario" placeholder="Nombre completo (Apellidos primero)"><br>
        <input type="password" id="clave" placeholder="Clave de acceso"><br>
        <button class="btn" onclick="validarAcceso()">Ingresar</button>
    </div>

    <div id="sec-video" class="hidden">
        <h2>Capacitación de Seguridad</h2>
        <p>Vea el video completo para habilitar el examen.</p>
        <video id="video-instruccion" controls>
            <source src="Inducción 2025 16.06.25.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
        <br>
        <button class="btn" onclick="mostrarExamen()">Comenzar Evaluación</button>
    </div>

    <div id="sec-examen" class="hidden">
        <h2 id="titulo-examen">Evaluación</h2>
        <div id="contenedor-preguntas"></div>
        <button class="btn" onclick="calificar()">Enviar Resultados</button>
    </div>
</div>

<script>
    const bancoPreguntas = [
        { q: "En este documento se establecen Procedimientos de Prevención de Actos de Interferencia Ilícita y Procedimientos de Medidas de Seguridad Reforzadas:", a: ["a) Plan de Seguridad del Aeropuerto", "b) Manual de Seguridad Industrial", "c) Reglamento de Operaciones del AICM", "d) Manual de Seguridad Operacional"], correct: 0 },
        { q: "Es un acto de interferencia ilícita:", a: ["a) Que una aeronave aterrizando por viento cruzado, se vaya al aire.", "b) Comunicación de información falsa que compromete a la seguridad de una aeronave...", "c) Fuga de gas en un local comercial del Fast Food.", "d) Ninguna de las anteriores."], correct: 1 },
        { q: "El ingreso de personas por los controles de acceso del AICM, se permite verificando:", a: ["a) Credenciales de cada empresa", "b) El uniforme", "c) Credenciales con código de barras", "d) Tarjetas de Identificación Aeroportuaria"], correct: 3 },
        { q: "La definición: 'Es un Aeródromo civil de servicio público declarado internacional...', corresponde a:", a: ["a) Pista paralela", "b) Aeródromo Privado", "c) Aeropuerto Regional", "d) Aeropuerto Internacional"], correct: 3 },
        { q: "Los siguientes conceptos son zonas de seguridad en el AICM:", a: ["a) Zona sin Restricciones/Pública y Zona Estéril", "b) Zona de Protección Civil y Zona de Comidas", "c) Zona de Pistas y de Calles de Rodajes", "d) Zona de Combustibles y Zona de Estacionamientos"], correct: 0 },
        { q: "La definición de control de seguridad es la siguiente:", a: ["a) Tarjetas de Identificación Aeroportuaria", "b) Control en pasillo ambulatorio separado por puertas de cristal", "c) Esa definición no se encuentra en la presentación", "d) Medios para evitar se introduzcan armas, explosivos u objetos..."], correct: 3 },
        { q: "Son derechos y obligaciones del portador de una TIA:", a: ["a) Pedir prestada una en caso de olvido", "b) Guiar a compañeros sin TIA", "c) Usar accesos permitidos, no transferir TIA y reportar amenazas/riesgos", "d) Respuestas a), b) y c) son incorrectas"], correct: 2 },
        { q: "La zona sin restricciones/pública de un aeropuerto se define como:", a: ["a) Área frente a la terminal donde descienden los pasajeros", "b) Zona del aeropuerto a la que tiene acceso el público o el acceso no está restringido", "c) La parte de la pista en la que aterrizan las aeronaves", "d) La parte de la Plataforma en donde se estacionan las aeronaves"], correct: 1 },
        { q: "Los elementos en el control de un PIP son: Indicaciones de uso Obligatorio, Estrobo de lectora de TIA, Lectora de TIA e Indicaciones de artículos prohibidos.", a: ["a) Verdadero", "b) Falso"], correct: 0 },
        { q: "La Alerta Uno en el Plan de Contingencia es cuando se presenta la posibilidad de que ocurra una contingencia, la cual puede ser superada sin daños o lesiones.", a: ["a) Verdadero", "b) Falso"], correct: 0 },
        { q: "El área restringida del aeropuerto, es la zona media entre el puesto de inspección de personas y la aeronave.", a: ["a) Verdadero", "b) Falso"], correct: 1 },
        { q: "Los tipos de TIA en el AICM son Permanente, Temporal y de Visitante.", a: ["a) Verdadero", "b) Falso"], correct: 0 },
        { q: "Cuando la TIA de un usuario sea rechazada en cualquier lectora de un PIP, debe pedir que se presente el supervisor y llamen a un representante de la SEMAR.", a: ["a) Verdadero", "b) Falso"], correct: 1 },
        { q: "Dentro de los procedimientos de inspección, nunca debo dejar que hagan revisiones manuales a mi persona y pertenencias.", a: ["a) Verdadero", "b) Falso"], correct: 1 },
        { q: "El propósito y objetivo de la seguridad AVSEC es tratar de buscar estupefacientes, sustancias alucinógenas y dinero ilícito.", a: ["a) Verdadero", "b) Falso"], correct: 1 }
    ];

    let preguntasAleatorias = [];
    let nombreCandidato = "";

    function validarAcceso() {
        const pass = document.getElementById('clave').value;
        nombreCandidato = document.getElementById('nombre-usuario').value;
        if (pass === "1455" && nombreCandidato.length > 5) {
            document.getElementById('sec-login').classList.add('hidden');
            document.getElementById('sec-video').classList.remove('hidden');
        } else {
            alert("Clave incorrecta o falta nombre completo.");
        }
    }

    function mostrarExamen() {
        document.getElementById('sec-video').classList.add('hidden');
        document.getElementById('sec-examen').classList.remove('hidden');
        preguntasAleatorias = [...bancoPreguntas].sort(() => Math.random() - 0.5);
        renderizarPreguntas();
    }

    function renderizarPreguntas() {
        const contenedor = document.getElementById('contenedor-preguntas');
        contenedor.innerHTML = "";
        preguntasAleatorias.forEach((p, i) => {
            let html = `<div class="pregunta"><p><strong>${p.q}</strong></p>`;
            p.a.forEach((opcion, index) => {
                html += `<label><input type="radio" name="p${i}" value="${index}"> ${opcion}</label><br>`;
            });
            html += `</div>`;
            contenedor.innerHTML += html;
        });
    }

    function calificar() {
        let aciertos = 0;
        let registroDetallado = "";
        preguntasAleatorias.forEach((p, i) => {
            const r = document.querySelector(`input[name="p${i}"]:checked`);
            const esCorrecta = r && parseInt(r.value) === p.correct;
            if (esCorrecta) aciertos++;
            registroDetallado += `P: ${p.q} | Correcta: ${esCorrecta ? 'SI' : 'NO'}; \n`;
        });

        if (aciertos >= 12) {
            alert(`¡Aprobado! Puntaje: ${aciertos}/15. Generando constancia...`);
            generarPDF(aciertos);
            enviarABaseDatos(aciertos, registroDetallado);
        } else {
            alert(`Calificación insuficiente (${aciertos}/15). Enviando reporte y reiniciando video...`);
            enviarABaseDatos(aciertos, registroDetallado);
            document.getElementById('sec-examen').classList.add('hidden');
            document.getElementById('sec-video').classList.remove('hidden');
        }
    }

    function enviarABaseDatos(puntos, detalle) {
        // CORRECCIÓN: URL ENTRE COMILLAS
        const urlGAS = "https://script.google.com/macros/s/AKfycbwe4w56RqOi1NIORsAlq1pzpn-Nf1vmJzISZfqjCwkeFSul4EWjEUfWBl4-CPjwwTsX/exec"; 
        const datos = { nombre: nombreCandidato, aciertos: puntos, empresa: "AICM - Seguridad", detalle: detalle };

        fetch(urlGAS, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
        });
    }

    function generarPDF(puntos) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.setFontSize(22);
        doc.text("CONSTANCIA DE CAPACITACIÓN", 148, 50, { align: "center" });
        doc.setFontSize(16);
        doc.text(`Se otorga la presente a: ${nombreCandidato.toUpperCase()}`, 148, 80, { align: "center" });
        doc.text(`Por haber aprobado la Evaluación de Seguridad AICM con ${puntos} aciertos.`, 148, 100, { align: "center" });
        doc.save(`Constancia_${nombreCandidato}.pdf`);
    }
</script>
</body>
</html>
